name: ECS simple deploy

on:
  workflow_call:
    inputs:
      app-name:
        description: 'App name matching the Terraform app_name variable (e.g. perma-filecheck)'
        required: true
        type: string
      environment:
        description: >
          Deployment environment matching the Terraform environment variable
          (e.g. staging, production). Leave empty for single-environment apps.
          When set, this activates the corresponding GitHub Environment, enabling
          protection rules and environment-scoped secrets.
        required: false
        type: string
        default: ''
      aws-region:
        description: 'AWS region'
        required: false
        type: string
        default: us-east-1
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: Dockerfile
      timeout-seconds:
        description: 'Maximum time to wait for the ECS deployment to become stable'
        required: false
        type: string
        default: '900'
    secrets:
      aws-role-arn:
        description: 'IAM role ARN to assume via OIDC (github_role_arn output from Terraform)'
        required: true
    outputs:
      full-name:
        description: 'Resolved app name including environment prefix when provided'
        value: ${{ jobs.deploy.outputs.full-name }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      full-name: ${{ steps.name.outputs.full-name }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve application full name
        id: name
        shell: bash
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            echo "full-name=${{ inputs.environment }}-${{ inputs.app-name }}" >> "$GITHUB_OUTPUT"
          else
            echo "full-name=${{ inputs.app-name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Build and push image
        uses: harvard-lil/lil-actions/ecs-build@main
        with:
          ecr-repository: ${{ steps.name.outputs.full-name }}
          dockerfile: ${{ inputs.dockerfile }}

      - name: Deploy to ECS
        uses: harvard-lil/lil-actions/ecs-deploy@main
        with:
          cluster: ${{ steps.name.outputs.full-name }}
          service: ${{ steps.name.outputs.full-name }}

      - name: Wait for ECS deployment
        uses: harvard-lil/lil-actions/ecs-wait-for-deployment@main
        with:
          cluster: ${{ steps.name.outputs.full-name }}
          service: ${{ steps.name.outputs.full-name }}
          timeout-seconds: ${{ inputs.timeout-seconds }}
