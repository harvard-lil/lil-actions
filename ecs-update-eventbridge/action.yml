name: 'Update EventBridge rules with new ECS task definition'
description: >
  Updates EcsParameters.TaskDefinitionArn on one or more EventBridge rules
  to point at a new task definition revision.

inputs:
  event-rules:
    description: 'Comma-separated list of EventBridge rule names to update'
    required: true
  task-definition-arn:
    description: 'New ECS task definition ARN'
    required: true

runs:
  using: composite
  steps:
    - name: Update EventBridge rules
      shell: bash
      env:
        EVENT_RULES: ${{ inputs.event-rules }}
        TASK_DEF_ARN: ${{ inputs.task-definition-arn }}
      run: |
        IFS=',' read -ra RULES <<< "$EVENT_RULES"
        for RULE in "${RULES[@]}"; do
          TARGETS=$(aws events list-targets-by-rule --rule "$RULE")
          UPDATED=$(echo "$TARGETS" \
            | jq --arg arn "$TASK_DEF_ARN" \
              '[.Targets[0] | .EcsParameters.TaskDefinitionArn = $arn | {Id, Arn, RoleArn, Input, EcsParameters}]')
          aws events put-targets --rule "$RULE" --targets "$UPDATED" > /dev/null
        done
