name: Secret scan

# Reusable secret-scanning workflow. Runs TruffleHog over the change that
# triggered the calling workflow:
#   - on pull_request: scans the PR's commit range (base..head)
#   - on push:         scans the pushed range (before..after)
# so it catches secrets *introduced* by a change, even if a later commit in
# the same range removes them. It does not retroactively scan existing
# history, so it is safe to adopt on a repo with pre-existing content.
#
# Call it from a repo with a thin workflow:
#
#   jobs:
#     secret-scan:
#       uses: harvard-lil/lil-actions/.github/workflows/secret-scan.yml@main
#
# Pass `with: extra_args: '--results=verified'` to reduce noise, or add
# `--exclude-paths` etc. as needed.

on:
  workflow_call:
    inputs:
      extra_args:
        description: Extra flags passed to TruffleHog (result scope, excludes, etc.).
        required: false
        type: string
        default: '--results=verified,unknown'

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Full history so the action can resolve the base..head range.
          fetch-depth: 0

      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: ${{ inputs.extra_args }}
