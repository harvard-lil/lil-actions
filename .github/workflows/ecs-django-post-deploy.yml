name: ECS Django post deploy

on:
  workflow_call:
    inputs:
      app-name:
        description: 'App name matching the Terraform app_name variable'
        required: true
        type: string

      environment:
        description: >
          Deployment environment matching the Terraform environment variable
          e.g. staging, prod. Leave empty for single-environment apps.
        required: false
        type: string
        default: ''

      aws-region:
        description: 'AWS region'
        required: false
        type: string
        default: us-east-1

      container:
        description: >
          ECS container name. Defaults to the resolved full app name when omitted.
        required: false
        type: string
        default: ''

      timeout-seconds:
        description: 'Maximum time to wait for ECS deployment to complete'
        required: false
        type: string
        default: '900'

      migration-check-command:
        description: 'Command used to check for pending Django migrations'
        required: false
        type: string
        default: 'uv run python manage.py migrate --plan'

      migrate-command:
        description: 'Command used to run Django migrations'
        required: false
        type: string
        default: 'uv run python manage.py migrate --noinput'

    secrets:
      aws-role-arn:
        description: 'IAM role ARN to assume via OIDC'
        required: true

jobs:
  post-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Resolve application full name
        id: name
        shell: bash
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            echo "full_name=${{ inputs.environment }}-${{ inputs.app-name }}" >> "$GITHUB_OUTPUT"
          else
            echo "full_name=${{ inputs.app-name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve ECS container name
        id: container
        shell: bash
        run: |
          if [ -n "${{ inputs.container }}" ]; then
            echo "name=${{ inputs.container }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ steps.name.outputs.full_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Wait for ECS deployment
        uses: harvard-lil/lil-actions/ecs-wait-for-deployment@main
        with:
          cluster: ${{ steps.name.outputs.full_name }}
          service: ${{ steps.name.outputs.full_name }}
          timeout-seconds: ${{ inputs.timeout-seconds }}

      - name: Run Django migrations if needed
        uses: harvard-lil/lil-actions/ecs-django-migrations@main
        with:
          cluster: ${{ steps.name.outputs.full_name }}
          service: ${{ steps.name.outputs.full_name }}
          container: ${{ steps.container.outputs.name }}
          check-command: ${{ inputs.migration-check-command }}
          migrate-command: ${{ inputs.migrate-command }}