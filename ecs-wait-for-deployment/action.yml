name: 'Wait for ECS deployment'

description: >
  Waits for an ECS service deployment to finish successfully.
  AWS credentials must be configured before this action runs.

inputs:
  cluster:
    description: 'ECS cluster name'
    required: true

  service:
    description: 'ECS service name'
    required: true

  timeout-seconds:
    description: 'Maximum time to wait for the ECS deployment to complete'
    required: false
    default: '900'

runs:
  using: composite
  steps:
    - name: Wait for ECS deployment
      shell: bash
      env:
        CLUSTER: ${{ inputs.cluster }}
        SERVICE: ${{ inputs.service }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      run: |
        set -euo pipefail

        echo "Waiting for ECS service deployment to complete..."
        echo "Cluster: $CLUSTER"
        echo "Service: $SERVICE"

        timeout "$TIMEOUT_SECONDS" aws ecs wait services-stable --cluster "$CLUSTER" --services "$SERVICE"

        SERVICE_JSON="$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query 'services[0]' --output json)"
        ROLLOUT_STATE="$(echo "$SERVICE_JSON" | jq -r '.deployments[] | select(.status == "PRIMARY") | .rolloutState')"
        ROLLOUT_REASON="$(echo "$SERVICE_JSON" | jq -r '.deployments[] | select(.status == "PRIMARY") | .rolloutStateReason // ""')"
        RUNNING_COUNT="$(echo "$SERVICE_JSON" | jq -r '.runningCount')"
        DESIRED_COUNT="$(echo "$SERVICE_JSON" | jq -r '.desiredCount')"

        echo "Primary deployment rollout state: $ROLLOUT_STATE"
        echo "Running tasks: $RUNNING_COUNT / $DESIRED_COUNT"

        if [ "$ROLLOUT_STATE" != "COMPLETED" ]; then
          echo "ECS deployment did not complete successfully."
          echo "$ROLLOUT_REASON"
          exit 1
        fi

        if [ "$RUNNING_COUNT" != "$DESIRED_COUNT" ]; then
          echo "ECS service is not running the desired number of tasks."
          exit 1
        fi

        echo "ECS deployment completed successfully."