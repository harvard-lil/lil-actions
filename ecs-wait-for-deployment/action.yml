name: 'Wait for ECS deployment'

description: >
  Waits for an ECS service deployment to finish successfully.
  AWS credentials must be configured before this action runs.

inputs:
  cluster:
    description: 'ECS cluster name'
    required: true

  service:
    description: 'ECS service name'
    required: true

  timeout-seconds:
    description: 'Maximum time to wait for the ECS deployment to complete'
    required: false
    default: '900'

  poll-interval-seconds:
    description: 'Seconds to wait between ECS deployment status checks'
    required: false
    default: '15'

runs:
  using: composite
  steps:
    - name: Wait for ECS deployment
      shell: bash
      env:
        CLUSTER: ${{ inputs.cluster }}
        SERVICE: ${{ inputs.service }}
        TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
        POLL_INTERVAL_SECONDS: ${{ inputs.poll-interval-seconds }}
      run: |
        set -euo pipefail

        echo "Waiting for ECS service deployment to complete..."
        echo "Cluster: $CLUSTER"
        echo "Service: $SERVICE"

        START_TIME="$(date +%s)"

        while true; do
          SERVICE_JSON="$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" --query 'services[0]' --output json)"
          ROLLOUT_STATE="$(echo "$SERVICE_JSON" | jq -r '.deployments[] | select(.status == "PRIMARY") | .rolloutState // "UNKNOWN"')"
          ROLLOUT_REASON="$(echo "$SERVICE_JSON" | jq -r '.deployments[] | select(.status == "PRIMARY") | .rolloutStateReason // ""')"
          DEPLOYMENT_ID="$(echo "$SERVICE_JSON" | jq -r '.deployments[] | select(.status == "PRIMARY") | .id // ""')"
          RUNNING_COUNT="$(echo "$SERVICE_JSON" | jq -r '.runningCount')"
          DESIRED_COUNT="$(echo "$SERVICE_JSON" | jq -r '.desiredCount')"
          PENDING_COUNT="$(echo "$SERVICE_JSON" | jq -r '.pendingCount')"

          echo "Primary deployment: $DEPLOYMENT_ID"
          echo "Rollout state: $ROLLOUT_STATE"
          echo "Running tasks: $RUNNING_COUNT / $DESIRED_COUNT"
          echo "Pending tasks: $PENDING_COUNT"

          if [ "$ROLLOUT_STATE" = "COMPLETED" ] && [ "$RUNNING_COUNT" = "$DESIRED_COUNT" ] && [ "$PENDING_COUNT" = "0" ]; then
            echo "ECS deployment completed successfully."
            exit 0
          fi

          if [ "$ROLLOUT_STATE" = "FAILED" ]; then
            echo "ECS deployment failed."
            echo "$ROLLOUT_REASON"
            exit 1
          fi

          NOW="$(date +%s)"
          ELAPSED="$((NOW - START_TIME))"

          if [ "$ELAPSED" -ge "$TIMEOUT_SECONDS" ]; then
            echo "Timed out waiting for ECS deployment to complete after ${TIMEOUT_SECONDS}s."
            echo "Last rollout state: $ROLLOUT_STATE"
            echo "$ROLLOUT_REASON"
            exit 1
          fi

          echo "Deployment still in progress. Waiting ${POLL_INTERVAL_SECONDS}s..."
          sleep "$POLL_INTERVAL_SECONDS"
        done