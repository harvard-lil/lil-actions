name: 'Build and push image to AWS ECR'
description: >
  Logs in to ECR, builds a Docker image, and pushes it with both the requested
  named tag and the immutable GitHub commit SHA. AWS credentials must be
  configured in the calling job before this action runs (via
  aws-actions/configure-aws-credentials).

inputs:
  ecr-repository:
    description: 'ECR repository name (not the full URI)'
    required: true
  dockerfile:
    description: 'Path to Dockerfile'
    required: false
    default: 'Dockerfile'
  image-tag:
    description: 'Named tag to apply'
    required: false
    default: 'latest'

outputs:
  image-uri:
    description: 'Full ECR image URI with the named tag (registry/repository:image-tag)'
    value: ${{ steps.build-push.outputs.image-uri }}
  sha-image-uri:
    description: 'Full ECR image URI pinned to the GitHub commit SHA'
    value: ${{ steps.build-push.outputs.sha-image-uri }}

runs:
  using: composite
  steps:
    - name: Login to AWS ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

    - name: Build and push docker image to AWS ECR
      id: build-push
      shell: bash
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: ${{ inputs.ecr-repository }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        DOCKERFILE: ${{ inputs.dockerfile }}
      run: |
        set -euo pipefail

        IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"
        SHA_TAG="${GITHUB_SHA:-$IMAGE_TAG}"
        SHA_IMAGE_URI="$REGISTRY/$REPOSITORY:$SHA_TAG"
        TAGS=(-t "$IMAGE_URI")

        if [ "$SHA_IMAGE_URI" != "$IMAGE_URI" ]; then
          TAGS+=(-t "$SHA_IMAGE_URI")
        fi

        docker buildx build \
          --platform linux/amd64 \
          "${TAGS[@]}" \
          -f "$DOCKERFILE" \
          --push \
          .

        echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"
        echo "sha-image-uri=$SHA_IMAGE_URI" >> "$GITHUB_OUTPUT"
